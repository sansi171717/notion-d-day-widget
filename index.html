<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Day Widget</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: transparent; 
        }
        .widget-container {
            text-align: center;
            padding: 30px 50px; 
            /* 💡 수정된 부분: 하얀 박스 + 시계처럼 훨씬 둥글게 */
            border-radius: 20px; /* 테두리 둥글기 대폭 확대 (기존 12px -> 20px) */
            background-color: #ffffff; /* 하얀색 배경색 */
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); /* 은은한 그림자 */
            border: 1px solid #e9e9e7; /* 미세한 테두리 */
        }
        .title {
            font-size: 1.5rem; 
            /* 💡 수정된 부분: 어두운 배경에 맞게 제목 색상을 더 어두운 회색으로 */
            color: #37352f; /* 시계 글자처럼 짙은 회색 */
            margin-bottom: 12px;
            font-weight: 500;
        }
        .d-day {
            font-size: 4rem; 
            /* 기존 빨간색 포인트 유지 */
            color: #eb5757; 
            font-weight: bold;
            margin: 0;
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="title" id="title">2027 수능</div>
        <div class="d-day" id="dday">D-??2</div>
    </div>

    <script>
        // 목표 날짜: 2027년 11월 18일 자정 (context 기준 한국 수능일)
        const targetDate = new Date("2027-11-18T00:00:00").getTime(); 

        function updateDday() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.ceil(distance / (1000 * 60 * 60 * 24));

            let resultText = "";
            if (days > 0) {
                resultText = `D-${days}`;
            } else if (days === 0) {
                resultText = "D-Day!";
            } else {
                resultText = `D+${Math.abs(days)}`;
            }

            document.getElementById("dday").innerText = resultText;
        }

        updateDday();
        // 시계 위젯과 더 정밀하게 맞추기 위해 업데이트 간격을 1분으로 단축
        setInterval(updateDday, 1000 * 60); 
    </script>
</body>
</html>
