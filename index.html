<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Day Widget</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: transparent; /* 배경 완벽 투명 */
        }
        .widget-container {
            text-align: center;
            padding: 30px 50px; 
            background-color: transparent; /* 박스 배경 투명 */
            border: none; /* 테두리 제거 */
            box-shadow: none; /* 그림자 제거 */
        }
        /* ☀️ 라이트 모드 기본 글자색 (검은색 계열) */
        .title {
            font-size: 1.5rem; 
            color: #37352f; 
            margin-bottom: 12px;
            font-weight: 500;
        }
        .d-day {
            font-size: 4rem; 
            color: #eb5757; 
            font-weight: bold;
            margin: 0;
            line-height: 1.2;
        }

        /* 🌙 다크 모드일 때 변신하는 글자색 */
        @media (prefers-color-scheme: dark) {
            .title {
                color: rgba(255, 255, 255, 0.9); /* 흰색 계열로 변경 */
            }
            .d-day {
                color: #ff7575; /* 어두운 배경에서 더 잘 보이는 화사한 빨간색으로 변경 */
            }
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="title" id="title">2027 수능</div>
        <div class="d-day" id="dday">D-??</div>
    </div>

    <script>
        // 목표 날짜: 2027년 11월 18일 자정
        const targetDate = new Date("2027-11-18T00:00:00").getTime(); 

        function updateDday() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.ceil(distance / (1000 * 60 * 60 * 24));

            let resultText = "";
            if (days > 0) {
                resultText = `D-${days}`;
            } else if (days === 0) {
                resultText = "D-Day!";
            } else {
                resultText = `D+${Math.abs(days)}`;
            }

            document.getElementById("dday").innerText = resultText;
        }

        updateDday();
        setInterval(updateDday, 1000 * 60); 
    </script>
</body>
</html>
