<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Day Widget</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: transparent; 
        }
        .widget-container {
            text-align: center;
            padding: 30px 50px; /* 글자가 커진 만큼 여백도 조금 더 넓혔습니다 */
            border-radius: 16px;
            background-color: #f7f7f5; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e9e9e7;
        }
        .title {
            font-size: 1.5rem; /* 제목 글자 크기 확대 */
            color: #787774;
            margin-bottom: 12px;
            font-weight: 500;
        }
        .d-day {
            font-size: 4rem; /* 디데이 글자 크기 대폭 확대 */
            color: #eb5757; 
            font-weight: bold;
            margin: 0;
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="title" id="title">2026 수능</div>
        <div class="d-day" id="dday">D-??</div>
    </div>

    <script>
        // 목표 날짜: 2026년 11월 19일 자정
        const targetDate = new Date("2026-11-19T00:00:00").getTime(); 

        function updateDday() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.ceil(distance / (1000 * 60 * 60 * 24));

            let resultText = "";
            if (days > 0) {
                resultText = `D-${days}`;
            } else if (days === 0) {
                resultText = "D-Day!";
            } else {
                resultText = `D+${Math.abs(days)}`;
            }

            document.getElementById("dday").innerText = resultText;
        }

        updateDday();
        setInterval(updateDday, 1000 * 60 * 60); 
    </script>
</body>
</html>
