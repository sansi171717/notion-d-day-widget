<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Day Widget</title>
    <style>
        /* 노션 스타일과 어울리는 기본 설정 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: transparent; /* 노션 배경과 자연스럽게 어우러짐 */
        }
        .widget-container {
            text-align: center;
            padding: 24px 32px;
            border-radius: 12px;
            background-color: #f7f7f5; /* 노션의 옅은 회색 배경 느낌 */
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e9e9e7;
        }
        .title {
            font-size: 1.1rem;
            color: #787774;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .d-day {
            font-size: 2.2rem;
            color: #eb5757; /* 노션 빨간색 텍스트 포인트 */
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="title" id="title">2026 수능</div>
        <div class="d-day" id="dday">D-??</div>
    </div>

    <script>
        // 💡 여기에 원하는 목표 날짜를 YYYY-MM-DD 형식으로 입력하세요.
        const targetDate = new Date("2026-11-19T00:00:00").getTime(); 

        function updateDday() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // 남은 일수 계산
            const days = Math.ceil(distance / (1000 * 60 * 60 * 24));

            let resultText = "";
            if (days > 0) {
                resultText = `D-${days}`;
            } else if (days === 0) {
                resultText = "D-Day!";
            } else {
                resultText = `D+${Math.abs(days)}`;
            }

            document.getElementById("dday").innerText = resultText;
        }

        // 페이지 로드 시 즉시 실행
        updateDday();
        // 자정이 넘어갈 때를 대비해 1시간마다 업데이트
        setInterval(updateDday, 1000 * 60 * 60); 
    </script>
</body>
</html>
